project_name: consensus
version: 2

builds:
- env:
  - CGO_ENABLED=0
  goos:
  - linux
  - darwin
  goarch:
  - amd64
  - arm64
  ldflags:
    - -s -w -X consensus/build.Version={{.RawVersion}} -X consensus/build.Repo=https://github.com/ioSpark/consensus

dockers:
- image_templates:
  - "ghcr.io/iospark/{{.ProjectName}}:latest"
  - "ghcr.io/iospark/{{.ProjectName}}:{{.RawVersion}}"
  - "ghcr.io/iospark/{{.ProjectName}}:{{.Major}}.{{.Minor}}"
